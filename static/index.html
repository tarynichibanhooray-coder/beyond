<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Before — demo</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <div id="aura" class="idle" aria-hidden="true">
    <svg class="aura-filter" aria-hidden="true" focusable="false">
      <defs>
        <filter id="aura-smoke" x="-25%" y="-25%" width="150%" height="150%" color-interpolation-filters="sRGB">
          <feTurbulence type="fractalNoise" baseFrequency="0.009" numOctaves="5" seed="11" result="noise">
            <animate attributeName="baseFrequency" dur="18s" repeatCount="indefinite"
              values="0.004;0.013;0.006;0.015;0.005;0.011;0.004" />
            <animate attributeName="seed" dur="27s" repeatCount="indefinite"
              values="11;24;16;29;19;11" />
          </feTurbulence>
          <feDisplacementMap in="SourceGraphic" in2="noise" scale="100" xChannelSelector="R" yChannelSelector="G" result="warp">
            <animate attributeName="scale" dur="15s" repeatCount="indefinite"
              values="60;135;78;148;65;120;60" />
          </feDisplacementMap>
          <feGaussianBlur in="warp" stdDeviation="36" />
        </filter>
      </defs>
    </svg>
    <div class="aura-plume ambient">
      <span class="aura-wisp w1"></span>
      <span class="aura-wisp w2"></span>
      <span class="aura-wisp w3"></span>
      <span class="aura-wisp w4"></span>
    </div>
    <div class="aura-plume arabi">
      <span class="aura-wisp w1"></span>
      <span class="aura-wisp w2"></span>
      <span class="aura-wisp w3"></span>
    </div>
    <div class="aura-plume morrison">
      <span class="aura-wisp w1"></span>
      <span class="aura-wisp w2"></span>
      <span class="aura-wisp w3"></span>
    </div>
    <div class="aura-plume kierkegaard">
      <span class="aura-wisp w1"></span>
      <span class="aura-wisp w2"></span>
      <span class="aura-wisp w3"></span>
    </div>
  </div>
  <main class="wrap">
    <header class="head">
      <div class="head-metrics-fixed">
        <div class="head-metrics-cluster">
          <span id="timer" class="head-clock idle" aria-live="polite" aria-label="Time remaining">--:--</span>
          <div id="usage" class="token-meter idle" aria-live="polite" aria-label="Token usage">
            <div class="token-row">
              <span class="tok-label">in</span>
              <span id="tok-in" class="tok-in">0</span>
              <span class="tok-sep">·</span>
              <span class="tok-label">out</span>
              <span id="tok-out" class="tok-out">0</span>
            </div>
            <div class="token-row">
              <span class="tok-label">used</span>
              <span id="tok-used" class="tok-used">0</span>
              <span class="tok-sep">·</span>
              <span class="tok-label">rem</span>
              <span id="tok-rem" class="tok-rem">∞</span>
            </div>
          </div>
        </div>
      </div>
      <h1>In This Time Before</h1>
    </header>

    <section class="council-intro" id="councilIntro" aria-label="The council">
      <div class="council-grid" id="councilGrid"></div>
    </section>

    <section class="controls">
      <button type="button" id="run" class="btn">Start session</button>
      <span id="status" class="status idle">Idle</span>
    </section>

    <section id="log" class="log" aria-live="polite"></section>

    <section id="councilWatch" class="council-watch hidden" aria-live="polite" aria-label="Council speaking">
      <div class="watch-members" id="watchMembers"></div>
      <div class="watch-speech">
        <span id="watchSpeaker" class="watch-speaker">Council</span>
        <p id="watchLine" class="watch-line"></p>
      </div>
    </section>

    <section id="qa" class="qa hidden">
      <form id="answerForm" class="abox">
        <label class="acap" for="answer">Response</label>
        <textarea id="answer" rows="3" placeholder="Type your response…" autocomplete="off"></textarea>
      </form>
    </section>

    <section id="final" class="final hidden">
      <h2>Your final question</h2>
      <p id="final-q" class="final-q"></p>
    </section>

    <section id="sessionExport" class="session-export hidden">
      <button type="button" id="downloadSession" class="btn download-btn">Download conversation</button>
    </section>
  </main>
  <script>
    const run = document.getElementById("run");
    const qa = document.getElementById("qa");
    const answerForm = document.getElementById("answerForm");
    const answer = document.getElementById("answer");
    const status = document.getElementById("status");
    const timer = document.getElementById("timer");
    const log = document.getElementById("log");
    const councilIntro = document.getElementById("councilIntro");
    const councilGrid = document.getElementById("councilGrid");
    const watchMembers = document.getElementById("watchMembers");
    const councilWatch = document.getElementById("councilWatch");
    const watchSpeaker = document.getElementById("watchSpeaker");
    const watchLine = document.getElementById("watchLine");
    const finalBox = document.getElementById("final");
    const sessionExport = document.getElementById("sessionExport");
    const finalQ = document.getElementById("final-q");
    const downloadSession = document.getElementById("downloadSession");
    const auraEl = document.getElementById("aura");
    const usageEl = document.getElementById("usage");
    const tokIn = document.getElementById("tok-in");
    const tokOut = document.getElementById("tok-out");
    const tokUsed = document.getElementById("tok-used");
    const tokRem = document.getElementById("tok-rem");

    let sessionId = null;
    let sessionTranscriptFile = null;
    let mockMode = true;
    let currentQuestion = null;
    let remainingSec = null;
    const SESSION_BACKUP_KEY = "before-session-backup";
    let countdownId = null;
    let timerExpired = false;
    let allowFinalSubmit = false;
    let answerLocked = false;
    const TYPEWRITER_MS = 35;
    const TYPEWRITER_MS_SECONDARY = 29;
    const SPEAKER_PAUSE_MS = 2000;
    const typewriterHandles = new Map();
    let activeSpeaker = null;
    let councilMembers = [];
    let councilRoster = [];

    function stopTyping(el) {
      if (!el) return;
      const id = typewriterHandles.get(el);
      if (id != null) {
        clearInterval(id);
        typewriterHandles.delete(el);
      }
      el.classList.remove("typing");
    }

    function stopAllTyping() {
      typewriterHandles.forEach((_id, el) => stopTyping(el));
    }

    function typeInto(el, text, opts) {
      opts = opts || {};
      stopTyping(el);
      const full = spaceEmDashes(text || "");
      el.textContent = "";
      if (!full) return Promise.resolve();
      el.classList.add("typing");
      let i = 0;
      const speed = opts.speedMs != null ? opts.speedMs : TYPEWRITER_MS;
      return new Promise((resolve) => {
        const id = setInterval(() => {
          i += 1;
          el.textContent = full.slice(0, i);
          if (i >= full.length) {
            stopTyping(el);
            resolve();
          }
        }, speed);
        typewriterHandles.set(el, id);
      });
    }

    const REFLECTION_FIELD = {
      arabi: "disclosure_read",
      blake: "vision_read",
      morrison: "witness_read",
      kierkegaard: "dread_read",
    };

    function watchShortName(member) {
      if (member.id === "arabi") return "Arabi";
      const parts = member.name.trim().split(/\s+/);
      return parts[parts.length - 1];
    }

    function speakerLabel(memberId) {
      const m = councilMembers.find((x) => x.id === memberId);
      return m ? m.glyph + " " + m.name : memberId;
    }

    function speakerName(memberId) {
      const m = councilMembers.find((x) => x.id === memberId);
      return m ? m.name : memberId;
    }

    const DEFAULT_COUNCIL = [
      {
        id: "arabi",
        glyph: "◎",
        name: "Ibn Arabi",
        years: "1165–1240",
        role: "The Threshold",
        css_class: "arabi",
        bio_role:
          "Reads what is already opening in this person—not waiting for life to start, but meeting them in the in-between place where the most real things happen.",
        bio_pro:
          "Andalusian mystic philosopher whose work on imagination, the threshold, and the self as mirror remains among the most rigorous metaphysics of human experience.",
      },
      {
        id: "morrison",
        glyph: "Ψ",
        name: "Toni Morrison",
        years: "1931–2019",
        role: "The Clearing",
        css_class: "morrison",
        bio_role:
          "Sees through language to what is actually present — the word chosen over another word, what is named and what is carefully left unnamed. Holds the stories that shaped you, and what must be named before it can be lived. Practical and undeceived: neither cosmic nor urgent, but clear.",
        bio_pro:
          "American writer and professor whose fiction and criticism insist that what is unspoken and unwitnessed still shapes the present.",
      },
      {
        id: "kierkegaard",
        glyph: "Δ",
        name: "Søren Kierkegaard",
        years: "1813–1855",
        role: "The Leap",
        css_class: "kierkegaard",
        bio_role:
          "Names the dread of freedom—the choice you postpone—and presses you toward a question that demands you decide how to live.",
        bio_pro:
          "Danish philosopher and theologian, a founder of existential thought, who wrote on faith, anxiety, and the leap of choice.",
      },
    ];

    let auraMotionId = null;
    let auraWispParams = null;
    const auraReducedMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;

    const WISP_BASE = [
      { sx: 1.05, sy: 1.18, rot: -14 },
      { sx: 1.12, sy: 0.82, rot: 9 },
      { sx: 0.88, sy: 1.24, rot: -24 },
      { sx: 0.92, sy: 1.14, rot: 18 },
      { sx: 1.08, sy: 0.94, rot: -8 },
      { sx: 1.16, sy: 0.76, rot: 26 },
      { sx: 1.06, sy: 1.16, rot: -12 },
      { sx: 1.1, sy: 0.84, rot: 14 },
      { sx: 0.9, sy: 1.2, rot: -20 },
      { sx: 1.04, sy: 0.96, rot: -6 },
      { sx: 0.94, sy: 1.1, rot: 11 },
      { sx: 1.08, sy: 0.88, rot: -15 },
      { sx: 1.02, sy: 1.08, rot: 7 },
    ];

    function initAuraWisps() {
      if (auraWispParams || !auraEl) return;
      auraWispParams = [];
      auraEl.querySelectorAll(".aura-wisp").forEach((el, i) => {
        const n = i + 1;
        const base = WISP_BASE[i] || { sx: 1, sy: 1, rot: 0 };
        const isAmbient = !!el.closest(".aura-plume.ambient");
        auraWispParams.push({
          el,
          isAmbient,
          baseSx: base.sx,
          baseSy: base.sy,
          baseRot: base.rot,
          orbitRx: isAmbient ? 8.5 + (n * 1.31) % 6.5 : 3.2 + (n * 1.31) % 5.5,
          orbitRy: isAmbient ? 7.2 + (n * 1.07) % 5.8 : 2.6 + (n * 1.07) % 4.8,
          orbitTilt: (n * 0.873) % (Math.PI * 2),
          orbitSpeed: isAmbient ? 0.32 + (n * 0.027) % 0.18 : 0.09 + (n * 0.019) % 0.12,
          orbitPhase: n * 2.399963,
          curlSpeed: isAmbient ? 0.12 + (n * 0.024) % 0.14 : 0.05 + (n * 0.017) % 0.09,
          curlPhase: n * 1.618033,
          driftX: isAmbient ? 0.11 + (n % 5) * 0.018 : 0.032 + (n % 5) * 0.009,
          driftY: isAmbient ? 0.095 + (n % 4) * 0.022 : 0.028 + (n % 4) * 0.011,
          driftPhase: n * 0.773,
          rotSpeed: isAmbient ? 14 + (n * 1.4) % 12 : 3.5 + (n * 1.4) % 9,
          scaleAmp: isAmbient ? 0.09 + (n % 6) * 0.015 : 0.045 + (n % 6) * 0.01,
          motionAmp: isAmbient ? 2.6 : 1,
          opacityBase: isAmbient ? 0.42 : 0.56 + (n % 4) * 0.08,
          opacityAmp: isAmbient ? 0.05 : 0.1 + (n % 5) * 0.05,
          brSeed: [n * 0.67, n * 1.11, n * 0.49, n * 1.83],
          brBase: [
            26 + (n * 9) % 22, 38 + (n * 11) % 26,
            30 + (n * 7) % 24, 42 + (n * 13) % 20,
            46 + (n * 5) % 18, 34 + (n * 17) % 22,
            28 + (n * 19) % 26, 40 + (n * 3) % 24,
          ],
        });
      });
    }

    function updateAuraWisps(now) {
      const t = now * 0.001;
      auraWispParams.forEach((w) => {
        const m = w.motionAmp || 1;
        const o = w.orbitPhase + t * w.orbitSpeed;
        const ct = Math.cos(w.orbitTilt);
        const st = Math.sin(w.orbitTilt);
        const ox = Math.cos(o) * w.orbitRx;
        const oy = Math.sin(o * 0.91 + w.curlPhase) * w.orbitRy;
        const dx = (ox * ct - oy * st) * m
          + Math.sin(t * w.driftX + w.driftPhase) * 2.6 * m
          + Math.sin(t * 0.053 + w.curlPhase) * 1.5 * m;
        const dy = (ox * st + oy * ct) * m
          + Math.cos(t * w.driftY + w.driftPhase * 1.17) * 2.2 * m
          + Math.cos(t * 0.041 + w.curlPhase * 0.73) * 1.3 * m;
        const rot = w.baseRot + t * w.rotSpeed
          + Math.sin(t * w.curlSpeed + w.curlPhase) * 9 * m
          + Math.cos(t * 0.067 + w.driftPhase) * 5 * m;
        const sx = w.baseSx * (1 + Math.sin(t * 0.23 + w.driftPhase) * w.scaleAmp);
        const sy = w.baseSy * (1 + Math.cos(t * 0.17 + w.curlPhase) * w.scaleAmp * 0.9);
        const opacity = w.opacityBase + Math.sin(t * 0.19 + w.driftPhase * 0.55) * w.opacityAmp;
        const brRate = w.isAmbient ? 0.09 : 0.05;
        const brSwing = w.isAmbient ? 16 : 11;
        const br = w.brBase.map((base, j) =>
          base + Math.sin(t * (brRate + j * 0.008) + w.brSeed[j % 4]) * brSwing
        );
        w.el.style.transform = "translate(" + dx.toFixed(2) + "vw, " + dy.toFixed(2)
          + "vh) rotate(" + rot.toFixed(2) + "deg) scale(" + sx.toFixed(3)
          + ", " + sy.toFixed(3) + ")";
        w.el.style.opacity = opacity.toFixed(3);
        w.el.style.borderRadius = br[0] + "% " + br[1] + "% " + br[2] + "% " + br[3]
          + "% / " + br[4] + "% " + br[5] + "% " + br[6] + "% " + br[7] + "%";
      });
    }

    function tickAura(now) {
      if (!auraEl) {
        auraMotionId = null;
        return;
      }
      updateAuraWisps(now);
      auraMotionId = requestAnimationFrame(tickAura);
    }

    function startAuraMotion() {
      if (!auraEl) return;
      initAuraWisps();
      if (auraReducedMotion) {
        updateAuraWisps(performance.now());
        return;
      }
      if (auraMotionId != null) return;
      auraMotionId = requestAnimationFrame(tickAura);
    }

    function stopAuraMotion() {
      if (auraMotionId != null) {
        cancelAnimationFrame(auraMotionId);
        auraMotionId = null;
      }
    }

    function setAura(state) {
      if (!auraEl) return;
      auraEl.className = state;
      startAuraMotion();
    }

    function setAuraForSpeaker(speaker) {
      if (speaker === "arabi" || speaker === "morrison" || speaker === "kierkegaard") {
        setAura(speaker);
      }
    }

    function pauseBetweenSpeakers() {
      return new Promise((resolve) => setTimeout(resolve, SPEAKER_PAUSE_MS));
    }

    function renderCouncil(members) {
      councilMembers = members || [];
      councilRoster = councilMembers.map((m) => m.id);
      if (!councilGrid || !watchMembers) return;
      councilGrid.innerHTML = councilMembers.map((m) =>
        "<article class=\"council-member " + m.css_class + "\" data-speaker=\"" + m.id + "\" " +
        "tabindex=\"0\" role=\"button\" aria-expanded=\"false\">" +
        "<div class=\"council-member-head\">" +
        "<h3><span class=\"glyph\">" + escapeHtml(m.glyph) + "</span> " + escapeHtml(m.name) +
        "<span class=\"role\">" + escapeHtml(m.role) + "</span></h3>" +
        "<span class=\"bio-open-hint\" aria-hidden=\"true\"></span></div>" +
        "<div class=\"bio-detail\">" +
        "<p class=\"bio-role\">" + escapeHtml(m.bio_role) + "</p>" +
        "<p class=\"bio-pro\">" + escapeHtml(m.bio_pro) + "</p>" +
        "<p class=\"years\">" + escapeHtml(m.years) + "</p>" +
        "</div></article>"
      ).join("");
      watchMembers.innerHTML = councilMembers.map((m) =>
        "<div class=\"watch-member " + m.css_class + "\" data-speaker=\"" + m.id + "\">" +
        "<span class=\"glyph\">" + escapeHtml(m.glyph) + "</span>" +
        "<span class=\"name\">" + escapeHtml(watchShortName(m)) + "</span>" +
        "<span class=\"speak-ring\" aria-hidden=\"true\"></span></div>"
      ).join("");
    }

    async function loadCouncilConfig() {
      try {
        const res = await fetch("/api/council");
        const data = await readJsonResponse(res);
        renderCouncil(data.members && data.members.length ? data.members : DEFAULT_COUNCIL);
      } catch {
        renderCouncil(DEFAULT_COUNCIL);
      }
    }

    function typeCouncilLine(text, speedMs) {
      ensureMidScreen(councilWatch);
      return typeInto(watchLine, text, { speedMs: speedMs });
    }

    function ensureMidScreen(el) {
      if (!el) return;
      el.scrollIntoView({ behavior: "auto", block: "center", inline: "nearest" });
    }

    function transcriptBasename(path) {
      if (!path) return null;
      const parts = String(path).split(/[/\\]/);
      return parts[parts.length - 1] || null;
    }

    function setDownloadReady(visible) {
      if (!downloadSession) return;
      downloadSession.disabled = !visible;
    }

    function revealDownload() {
      if (sessionExport) sessionExport.classList.remove("hidden");
      setDownloadReady(!!sessionTranscriptFile);
      ensureMidScreen(sessionExport || downloadSession);
    }

    async function syncSessionCheckpoint() {
      if (!sessionId) return;
      try {
        const res = await fetch(`/api/session/${sessionId}/checkpoint`, { method: "POST" });
        if (!res.ok) return;
        const data = await readJsonResponse(res);
        if (data.transcript_path) {
          sessionTranscriptFile = transcriptBasename(data.transcript_path);
        }
      } catch (_err) {
        /* checkpoint best-effort */
      }
    }

    async function onTimerExpired() {
      if (!sessionId || timerExpired) return;
      timerExpired = true;
      stopCountdown();
      syncTimer(0);
      await syncSessionCheckpoint();
      revealDownload();
      const draft = answer.value.trim();
      if (draft) {
        allowFinalSubmit = true;
        answer.disabled = false;
        answer.readOnly = false;
      } else {
        allowFinalSubmit = false;
        answerLocked = true;
        answer.disabled = true;
        answer.readOnly = true;
      }
    }

    async function downloadSessionHtml() {
      if (!sessionTranscriptFile || !downloadSession) return;
      downloadSession.disabled = true;
      try {
        await syncSessionCheckpoint();
        const res = await fetch(
          "/api/transcript/" + encodeURIComponent(sessionTranscriptFile) + "/export"
        );
        if (!res.ok) {
          const err = await res.text();
          throw new Error(err.slice(0, 200) || "Export failed");
        }
        const blob = await res.blob();
        let filename = sessionTranscriptFile.replace(/\.json$/i, ".html");
        const disposition = res.headers.get("Content-Disposition");
        if (disposition) {
          const match = /filename=\"?([^\";]+)\"?/.exec(disposition);
          if (match && match[1]) filename = match[1];
        }
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = filename;
        document.body.appendChild(a);
        a.click();
        a.remove();
        URL.revokeObjectURL(url);
      } catch (e) {
        setStatus("Could not download session", "err");
      } finally {
        downloadSession.disabled = false;
      }
    }

    function saveSessionBackup() {
      if (!sessionId || !log) return;
      try {
        localStorage.setItem(SESSION_BACKUP_KEY, JSON.stringify({
          sessionId: sessionId,
          currentQuestion: currentQuestion,
          remainingSec: remainingSec,
          logHtml: log.innerHTML,
          finalQuestion: finalQ ? finalQ.textContent : "",
          finalVisible: finalBox && !finalBox.classList.contains("hidden"),
          exportVisible: sessionExport && !sessionExport.classList.contains("hidden"),
          sessionTranscriptFile: sessionTranscriptFile,
          qaVisible: qa && !qa.classList.contains("hidden"),
          savedAt: Date.now(),
        }));
      } catch (_err) {
        /* storage full or unavailable */
      }
    }

    function restoreSessionBackup() {
      if (!log || log.innerHTML.trim()) return false;
      let raw;
      try {
        raw = localStorage.getItem(SESSION_BACKUP_KEY);
      } catch (_err) {
        return false;
      }
      if (!raw) return false;
      let data;
      try {
        data = JSON.parse(raw);
      } catch (_err) {
        return false;
      }
      if (!data.logHtml) return false;
      log.innerHTML = data.logHtml;
      if (data.finalVisible && finalBox) {
        finalBox.classList.remove("hidden");
        if (finalQ) finalQ.textContent = data.finalQuestion || "";
      }
      if (data.exportVisible && sessionExport) {
        sessionExport.classList.remove("hidden");
        setDownloadReady(!!data.sessionTranscriptFile);
      }
      sessionTranscriptFile = data.sessionTranscriptFile || null;
      if (data.qaVisible && qa) qa.classList.remove("hidden");
      currentQuestion = data.currentQuestion || null;
      syncAnswerPrompt();
      return true;
    }

    function clearSessionBackup() {
      try {
        localStorage.removeItem(SESSION_BACKUP_KEY);
      } catch (_err) {
        /* ignore */
      }
    }

    function scrollToEl(el, block) {
      if (!el) return;
      el.scrollIntoView({ behavior: "auto", block: block || "nearest" });
    }

    function syncAnswerPrompt() {
      if (!currentQuestion) {
        answer.removeAttribute("aria-label");
        return;
      }
      answer.setAttribute("aria-label", "Response to: " + currentQuestion);
    }

    async function appendFeedQuestion(text, animate) {
      const block = document.createElement("article");
      block.className = "feed-question";
      block.innerHTML = "<h3>Question</h3><p class=\"qtext\"></p>";
      log.appendChild(block);
      const el = block.querySelector(".qtext");
      ensureMidScreen(block);
      if (animate) {
        await typeInto(el, text);
      } else {
        el.textContent = spaceEmDashes(text);
      }
      saveSessionBackup();
      return block;
    }

    function appendFeedAnswer(text) {
      const el = document.createElement("p");
      el.className = "feed-answer";
      el.textContent = spaceEmDashes(text);
      log.appendChild(el);
      ensureMidScreen(el);
      saveSessionBackup();
    }

    function setCouncilSpeaking(speaker) {
      activeSpeaker = speaker || null;
      const isAll = speaker === "all";
      document.querySelectorAll(".council-member[data-speaker]").forEach((el) => {
        el.classList.toggle("speaking", !!speaker && !isAll && el.dataset.speaker === speaker);
        el.classList.toggle("listening", isAll);
      });
      document.querySelectorAll(".watch-member[data-speaker]").forEach((el) => {
        el.classList.toggle("active", !!speaker && !isAll && el.dataset.speaker === speaker);
        el.classList.toggle("listening", isAll);
      });
      if (speaker && speakerName(speaker)) {
        watchSpeaker.textContent = speakerName(speaker) + " speaks";
      } else if (isAll) {
        watchSpeaker.textContent = "Council";
      } else {
        watchSpeaker.textContent = "Council";
      }
    }

    function showCouncilWatch() {
      councilWatch.classList.remove("hidden");
      councilIntro.classList.add("session-active");
      ensureMidScreen(councilWatch);
    }

    function hideCouncilWatch() {
      councilWatch.classList.add("hidden");
      councilIntro.classList.remove("session-active");
      setCouncilSpeaking(null);
      setAura("idle");
      document.querySelectorAll(".council-member[data-speaker], .watch-member[data-speaker]").forEach((el) => {
        el.classList.remove("speaking", "listening", "active");
      });
      stopAllTyping();
      watchLine.textContent = "";
    }

    function pulseAllListening() {
      setCouncilSpeaking("all");
    }

    const SPEAKER_LABEL = {};

    function getSpeakerLabel(memberId) {
      return speakerLabel(memberId);
    }

    function setStatus(text, cls) {
      status.textContent = text;
      status.className = "status " + (cls || "");
    }

    function formatTokens(n) {
      if (n == null) return "∞";
      return Number(n).toLocaleString("en-US");
    }

    function renderUsage(usage, isMock) {
      usageEl.classList.remove("mock", "idle", "live");
      if (isMock) {
        usageEl.classList.add("mock", "idle");
        tokIn.textContent = "—";
        tokOut.textContent = "—";
        tokUsed.textContent = "mock";
        tokRem.textContent = "—";
        return;
      }
      const session = usage && usage.session ? usage.session : null;
      const server = usage && usage.server ? usage.server : null;
      const activeSession = session && (session.api_calls > 0 || session.used_tokens > 0);
      const src = activeSession ? session : (server || session);
      if (!src) {
        usageEl.classList.add("idle");
        tokIn.textContent = "0";
        tokOut.textContent = "0";
        tokUsed.textContent = "0";
        tokRem.textContent = formatTokens(
          usage && usage.token_budget ? usage.token_budget : null
        );
        return;
      }
      usageEl.classList.add("live");
      const inTok = src.billable_input_tokens != null
        ? src.billable_input_tokens
        : src.input_tokens || 0;
      tokIn.textContent = formatTokens(inTok);
      tokOut.textContent = formatTokens(src.output_tokens || 0);
      tokUsed.textContent = formatTokens(
        src.used_tokens != null ? src.used_tokens : src.total_tokens || 0
      );
      const rem = server && server.remaining_tokens != null
        ? server.remaining_tokens
        : src.remaining_tokens;
      tokRem.textContent = formatTokens(rem);
    }

    async function refreshUsage() {
      try {
        const url = sessionId
          ? "/api/usage?session_id=" + encodeURIComponent(sessionId)
          : "/api/usage";
        const res = await fetch(url);
        const data = await readJsonResponse(res);
        mockMode = !!data.mock_mode;
        renderUsage(
          {
            session: data.session || null,
            server: data.server,
            token_budget: data.token_budget,
          },
          mockMode
        );
      } catch {
        /* keep last values */
      }
    }

    function handleSessionEnded() {
      stopCountdown();
      syncTimer(0);
      hideCouncilWatch();
      sessionId = null;
      currentQuestion = null;
      qa.classList.add("hidden");
      qa.classList.remove("responding");
      answer.disabled = true;
      run.disabled = false;
      setStatus("", "");
      saveSessionBackup();
    }

    function isSessionEndedError(msg) {
      if (!msg) return false;
      const lower = String(msg).toLowerCase();
      return lower.includes("session has ended") || lower.includes("unknown session");
    }

    function fmt(sec) {
      if (sec == null || sec === "") return "--:--";
      const clamped = Math.max(0, Math.floor(sec));
      const m = Math.floor(clamped / 60);
      const s = clamped % 60;
      return String(m).padStart(2, "0") + ":" + String(s).padStart(2, "0");
    }

    function renderTimer() {
      timer.textContent = fmt(remainingSec);
      timer.classList.toggle("idle", remainingSec == null);
      timer.classList.toggle("active", remainingSec != null && remainingSec > 0);
      timer.classList.toggle("done", remainingSec === 0);
    }

    function stopCountdown() {
      if (countdownId != null) {
        clearInterval(countdownId);
        countdownId = null;
      }
    }

    function syncTimer(sec) {
      remainingSec = sec;
      renderTimer();
    }

    function startCountdown(sec) {
      stopCountdown();
      syncTimer(sec);
      countdownId = setInterval(() => {
        if (remainingSec == null || remainingSec <= 0) {
          onTimerExpired();
          return;
        }
        remainingSec -= 1;
        renderTimer();
      }, 1000);
    }

    function spaceEmDashes(s) {
      if (s == null || s === "") return s || "";
      return String(s).replace(/(\S)\s*—\s*(\S)/g, "$1 — $2");
    }

    function escapeHtml(s) {
      const d = document.createElement("div");
      d.textContent = spaceEmDashes(s);
      return d.innerHTML;
    }

    function setActiveTurnSection(turnEl, activeEl) {
      if (!turnEl) return;
      turnEl.querySelectorAll(".private-thoughts, .live-conversation, .forged").forEach((el) => {
        el.classList.toggle("section-active", el === activeEl);
        el.classList.toggle("section-idle", !!activeEl && el !== activeEl);
      });
    }

    function focusWatchSpeaker(label) {
      watchSpeaker.textContent = label || "Council";
      stopTyping(watchLine);
      watchLine.textContent = "";
      watchLine.classList.remove("typing");
    }

    function turnRoman(n) {
      const roman = ["", "I", "II", "III"];
      const idx = Number(n);
      return idx >= 1 && idx <= 3 ? roman[idx] : String(n);
    }

    function createTurnShell() {
      const turnNum = log.querySelectorAll(".turn").length + 1;
      const turn = document.createElement("div");
      turn.className = "turn";
      turn.innerHTML = "<h2 class=\"turn-title\">" + turnRoman(turnNum) + "</h2>";
      log.appendChild(turn);
      ensureMidScreen(turn);
      return turn;
    }

    function conversationShell() {
      const wrap = document.createElement("article");
      wrap.className = "conversation live-conversation";
      wrap.innerHTML =
        "<h3>Conversation</h3><div class=\"conv-lines\"></div>";
      return wrap;
    }

    function privateThoughtsShell() {
      const wrap = document.createElement("article");
      wrap.className = "private-thoughts";
      const cards = councilRoster.map((id) => {
        const m = councilMembers.find((x) => x.id === id);
        const cls = m ? m.css_class : id;
        const name = m ? m.name : id;
        return "<div class=\"thought " + cls + "\" data-speaker=\"" + id + "\"><strong>" +
          escapeHtml(name) + "</strong><p class=\"typed\"></p></div>";
      }).join("");
      wrap.innerHTML =
        "<h3>Observations</h3>" +
        "<div class=\"thought-grid\">" + cards + "</div>";
      return wrap;
    }

    async function revealPrivateThoughts(turnEl, event) {
      setAura("thinking");
      let shell = turnEl.querySelector(".private-thoughts");
      if (!shell) {
        shell = privateThoughtsShell();
        turnEl.appendChild(shell);
      }
      setActiveTurnSection(turnEl, shell);

      const reflections = event.reflections || {};
      for (let i = 0; i < councilRoster.length; i += 1) {
        const memberId = councilRoster[i];
        if (i > 0) await pauseBetweenSpeakers();
        const card = shell.querySelector(".thought[data-speaker=\"" + memberId + "\"]");
        const typed = card && card.querySelector(".typed");
        if (!card || !typed) continue;
        const field = REFLECTION_FIELD[memberId];
        const fromMap = reflections[memberId] || {};
        const fromLegacy = event[memberId + "_reflection"] || {};
        const text = (field && (fromMap[field] || fromLegacy[field])) || "";
        card.classList.add("thought-typing");
        setCouncilSpeaking(memberId);
        focusWatchSpeaker(speakerName(memberId) + " thinks…");
        ensureMidScreen(card);
        await typeInto(typed, text);
        card.classList.remove("thought-typing");
      }
      pulseAllListening();
    }

    async function applyStreamEvent(turnEl, event) {
      if (event.type === "phase") {
        if (event.label) setStatus(event.label, "run");
        if (event.phase === "reflect") {
          pulseAllListening();
          setAura("thinking");
        } else if (event.phase === "deliberate") {
          focusWatchSpeaker("The council speaks…");
        } else if (event.phase === "speak" && event.speaker) {
          setCouncilSpeaking(event.speaker);
          focusWatchSpeaker(speakerName(event.speaker) + " speaks…");
          setAuraForSpeaker(event.speaker);
        } else if (event.phase === "decide") {
          setCouncilSpeaking(null);
          focusWatchSpeaker("Formulating your next question…");
        }
        return;
      }
      if (event.type === "reflections") {
        await revealPrivateThoughts(turnEl, event);
        return;
      }
      if (event.type === "speak") {
        const entry = (event.conversation || []).slice(-1)[0];
        if (!entry) return;
        const full = entry.text || "";
        await pauseBetweenSpeakers();
        setCouncilSpeaking(entry.speaker);
        setAuraForSpeaker(entry.speaker);
        focusWatchSpeaker(getSpeakerLabel(entry.speaker) + " speaks");
        await typeCouncilLine(full);
        let conv = turnEl.querySelector(".live-conversation");
        if (!conv) {
          conv = conversationShell();
          turnEl.appendChild(conv);
        }
        const lines = conv.querySelector(".conv-lines");
        if (!lines) return;
        const line = document.createElement("div");
        const who = getSpeakerLabel(entry.speaker);
        line.className = "conv-line line-" + (entry.speaker || "");
        line.innerHTML =
          "<strong>" + escapeHtml(who) + "</strong> " +
          "<span class=\"line-text\">" + escapeHtml(full) + "</span>";
        lines.appendChild(line);
        setActiveTurnSection(turnEl, conv);
        saveSessionBackup();
        return;
      }
    }

    async function consumeAnswerStream(res, turnEl) {
      const reader = res.body.getReader();
      const dec = new TextDecoder();
      let buf = "";
      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        buf += dec.decode(value, { stream: true });
        const chunks = buf.split("\n\n");
        buf = chunks.pop() || "";
        for (const chunk of chunks) {
          const line = chunk.split("\n").find((l) => l.startsWith("data: "));
          if (!line) continue;
          const event = JSON.parse(line.slice(6));
          if (event.type === "turn_done") return event;
          if (event.type === "error") throw new Error(event.detail || "Stream error");
          await applyStreamEvent(turnEl, event);
        }
      }
      throw new Error("Council stream ended early");
    }

    async function finishTurnShell(turnEl, data) {
      if (data.question_rephrased) return;
      const title = turnEl.querySelector(".turn-title");
      if (title) title.textContent = turnRoman(data.turn);
      if (data.done) {
        hideCouncilWatch();
        saveSessionBackup();
        return;
      }
      if (!data.next_question) return;
      const who = data.chosen_asker_display || data.chosen_asker || "Council";
      const forgedEl = document.createElement("article");
      forgedEl.className = "forged";
      forgedEl.innerHTML =
        "<h3>" + escapeHtml(who) + " asks next</h3>" +
        "<p class=\"q-next typed\"></p>";
      turnEl.appendChild(forgedEl);
      setActiveTurnSection(turnEl, forgedEl);
      setCouncilSpeaking(data.chosen_asker);
      focusWatchSpeaker(who + " asks next");
      hideCouncilWatch();
      ensureMidScreen(forgedEl);
      await typeInto(forgedEl.querySelector(".q-next"), data.next_question || "");
      saveSessionBackup();
    }

    async function finishTurn(data, turnEl) {
      allowFinalSubmit = false;
      if (data.transcript_path) {
        sessionTranscriptFile = transcriptBasename(data.transcript_path);
      }
      if (!timerExpired) syncTimer(data.remaining_sec);
      mockMode = !!data.mock_mode;
      renderUsage(data.usage, mockMode);
      if (turnEl) setActiveTurnSection(turnEl, null);

      if (data.done) {
        qa.classList.add("hidden");
        run.disabled = false;
        setStatus("Done", "done");
        stopCountdown();
        syncTimer(0);
        timerExpired = true;
        answerLocked = true;
        answer.disabled = true;
        if (data.transcript_path) {
          sessionTranscriptFile = transcriptBasename(data.transcript_path);
        }
        if (finalBox) finalBox.classList.remove("hidden");
        finalQ.textContent = "";
        await typeInto(finalQ, data.final_question || "");
        revealDownload();
        ensureMidScreen(sessionExport || downloadSession);
        hideCouncilWatch();
        sessionId = null;
        currentQuestion = null;
        saveSessionBackup();
        return;
      }

      if (data.question_rephrased) {
        if (turnEl) turnEl.remove();
        hideCouncilWatch();
        setStatus("", "");
        currentQuestion = data.next_question || "";
        if (!currentQuestion) {
          throw new Error("No rephrased question returned");
        }
        syncAnswerPrompt();
        await appendFeedQuestion(currentQuestion, true);
        qa.classList.remove("hidden");
        if (!timerExpired) {
          answer.disabled = false;
        } else if (allowFinalSubmit) {
          answer.disabled = false;
        }
        saveSessionBackup();
        answer.focus();
        return;
      }

      currentQuestion = data.next_question || "";
      if (!currentQuestion) {
        throw new Error("No next question returned by council");
      }
      syncAnswerPrompt();
      hideCouncilWatch();
      setStatus("", "");
      allowFinalSubmit = false;
      if (timerExpired) {
        answerLocked = true;
        answer.disabled = true;
        qa.classList.add("hidden");
      } else {
        answerLocked = false;
        answer.disabled = false;
        qa.classList.remove("hidden");
        answer.focus();
      }
      saveSessionBackup();
    }

    function clear() {
      stopCountdown();
      hideCouncilWatch();
      log.innerHTML = "";
      if (sessionExport) sessionExport.classList.add("hidden");
      finalBox.classList.add("hidden");
      finalQ.textContent = "";
      setDownloadReady(false);
      sessionTranscriptFile = null;
      remainingSec = null;
      timerExpired = false;
      allowFinalSubmit = false;
      answerLocked = false;
      renderTimer();
      renderUsage(null, mockMode);
      refreshUsage();
      councilIntro.classList.remove("session-active");
      qa.classList.remove("responding");
      qa.classList.add("hidden");
      answer.value = "";
      answer.disabled = false;
      answer.readOnly = false;
      syncAnswerPrompt();
      sessionId = null;
      currentQuestion = null;
      setAura("idle");
    }

    function showInlineError(msg) {
      const turn = document.createElement("div");
      turn.className = "turn";
      turn.innerHTML = "<p class=\"a\"><strong>Error</strong> " + escapeHtml(msg) + "</p>";
      log.appendChild(turn);
    }

    async function readJsonResponse(res) {
      const text = await res.text();
      if (!text) {
        if (!res.ok) throw new Error(res.statusText || "Request failed");
        return {};
      }
      let data;
      try {
        data = JSON.parse(text);
      } catch {
        throw new Error(text.slice(0, 200));
      }
      if (!res.ok) {
        throw new Error(data.detail || res.statusText || "Request failed");
      }
      return data;
    }

    run.addEventListener("click", async () => {
      clear();
      run.disabled = true;
      setStatus("Starting…", "run");
      try {
        const res = await fetch("/api/session/start", { method: "POST" });
        const data = await readJsonResponse(res);
        sessionId = data.session_id;
        sessionTranscriptFile = transcriptBasename(data.transcript_path);
        mockMode = !!data.mock_mode;
        currentQuestion = data.question;
        syncAnswerPrompt();
        startCountdown(data.remaining_sec);
        if (data.council) renderCouncil(data.council);
        clearSessionBackup();
        await appendFeedQuestion(currentQuestion, true);
        qa.classList.remove("hidden");
        councilIntro.classList.add("session-active");
        renderUsage(data.usage, mockMode);
        setStatus("", "");
        answer.disabled = false;
        saveSessionBackup();
        answer.focus();
      } catch (e) {
        run.disabled = false;
        setStatus("Error (server not running?)", "err");
      }
    });

    answer.addEventListener("keydown", (ev) => {
      if (ev.key !== "Enter" || ev.shiftKey || ev.isComposing) return;
      ev.preventDefault();
      if (!sessionId || answerLocked) return;
      if (timerExpired && !allowFinalSubmit) return;
      if (answer.disabled) return;
      const text = answer.value.trim();
      if (!text) return;
      answerForm.requestSubmit();
    });

    answer.addEventListener("input", () => {
      if (!timerExpired || allowFinalSubmit) return;
      answer.value = "";
    });

    answerForm.addEventListener("submit", async (ev) => {
      ev.preventDefault();
      if (!sessionId || answerLocked) return;
      if (timerExpired && !allowFinalSubmit) return;
      const text = answer.value.trim();
      if (!text) return;
      answer.disabled = true;
      showCouncilWatch();
      pulseAllListening();
      watchSpeaker.textContent = "";
      watchLine.textContent = "";
      appendFeedAnswer(text);
      const turnEl = createTurnShell();
      answer.value = "";
      qa.classList.add("hidden");
      setStatus("", "");
      try {
        const res = await fetch(`/api/session/${sessionId}/answer/stream`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ transcript: text }),
        });
        if (!res.ok) {
          const errData = await readJsonResponse(res);
          throw new Error(errData.detail || res.statusText || "Request failed");
        }
        const data = await consumeAnswerStream(res, turnEl);
        await finishTurnShell(turnEl, data);
        await finishTurn(data, turnEl);
        refreshUsage();
      } catch (e) {
        const msg = e && e.message ? e.message : "Unknown error";
        if (isSessionEndedError(msg)) {
          handleSessionEnded();
        } else {
          hideCouncilWatch();
          setStatus("Error (check server)", "err");
          showInlineError(msg);
          if (timerExpired && answer.value.trim()) {
            allowFinalSubmit = true;
            answerLocked = false;
            answer.disabled = false;
            qa.classList.remove("hidden");
          } else if (!timerExpired) {
            answerLocked = false;
            answer.disabled = false;
            qa.classList.remove("hidden");
          }
        }
      }
    });

    if (downloadSession) {
      downloadSession.addEventListener("click", downloadSessionHtml);
    }

    function toggleCouncilCard(card) {
      if (!card) return;
      const open = card.classList.toggle("is-expanded");
      card.setAttribute("aria-expanded", open ? "true" : "false");
    }

    if (councilGrid) {
      councilGrid.addEventListener("click", (ev) => {
        const card = ev.target.closest(".council-member");
        if (!card) return;
        toggleCouncilCard(card);
      });
      councilGrid.addEventListener("keydown", (ev) => {
        if (ev.key !== "Enter" && ev.key !== " ") return;
        const card = ev.target.closest(".council-member");
        if (!card) return;
        ev.preventDefault();
        toggleCouncilCard(card);
      });
    }

    window.addEventListener("beforeunload", saveSessionBackup);

    renderTimer();
    renderCouncil(DEFAULT_COUNCIL);
    loadCouncilConfig().then(() => refreshUsage());
    clearSessionBackup();
    startAuraMotion();
  </script>
</body>
</html>
