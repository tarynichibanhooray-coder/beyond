# Render Blueprint — connect this repo at https://dashboard.render.com
# After connect: set ANTHROPIC_API_KEY in the service Environment tab.
services:
  - type: web
    name: in-this-time-before
    runtime: python
    buildCommand: pip install -r requirements-anthropic.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: MOCK_MODE
        value: "false"
      - key: PROMPT_CACHE
        value: "true"
      - key: TOKEN_BUDGET
        value: "600000"
      - key: ANTHROPIC_MODEL
        value: claude-sonnet-4-6
      - key: COUNCIL_ROSTER
        value: arabi,morrison,kierkegaard
      - key: SESSION_DURATION_SECONDS
        value: "180"
      - key: ANTHROPIC_API_KEY
        sync: false
